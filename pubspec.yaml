name: blood_donor_connect
description: Connecting blood donors with lives in need.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.0.0

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # UI
  cupertino_icons: ^1.0.8

  # Utilities
  shared_preferences: ^2.3.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
